<section class="grid gap-6">
  <a routerLink="/alumno/comunicados" class="inline-flex w-fit items-center gap-2 rounded-lg border border-yachay-300 bg-white px-4 py-3 text-sm font-black text-yachay-800 transition hover:bg-yachay-100">
    <app-icon name="arrow-left" className="h-4 w-4" />
    Volver a comunicados
  </a>

  @if (successMessage()) {
    <div class="rounded-lg border border-yachay-success bg-yachay-success/10 px-4 py-3 text-sm font-bold text-yachay-success">
      {{ successMessage() }}
    </div>
  }

  <article class="overflow-hidden rounded-lg border border-yachay-300 bg-white shadow-sm">
    <div class="bg-ink-dark p-6 text-white">
      <p class="text-sm font-black uppercase tracking-wide text-sky-soft">{{ announcement().remitente }}</p>
      <h1 class="mt-2 text-3xl font-extrabold">{{ announcement().titulo }}</h1>
      <p class="mt-2 text-sm font-semibold text-cloud">{{ announcement().fecha }} · {{ announcement().destinatario }}</p>
    </div>

    <div class="grid gap-5 p-6 lg:grid-cols-[1fr_18rem]">
      <div>
        <h2 class="text-lg font-extrabold text-yachay-900">Contenido</h2>
        <p class="mt-4 text-sm font-semibold leading-7 text-yachay-muted">{{ announcement().contenido }}</p>
      </div>

      <aside class="grid gap-4 self-start rounded-lg border border-yachay-300 bg-yachay-100 p-5">
        <div>
          <p class="text-xs font-black uppercase tracking-wide text-yachay-muted">Lectura</p>
          <p class="mt-2 rounded-lg bg-white px-3 py-2 text-sm font-black text-yachay-900">
            {{ announcement().leido ? 'LEÍDO' : 'NO LEÍDO' }}
          </p>
        </div>
        <button type="button" class="btn-primary" (click)="markAsRead()">Marcar como leído</button>
      </aside>
    </div>
  </article>
</section>
