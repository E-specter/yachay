<main class="flex min-h-screen items-center justify-center bg-yachay-100 px-5 py-8 text-yachay-900">
  <section class="card-minimal w-full max-w-xl">
    <a routerLink="/login" class="text-sm font-bold text-yachay-800 transition hover:text-yachay-org-dark">
      Volver al login
    </a>

    <h1 class="mt-8 text-3xl font-extrabold">
      Recuperar contraseña
    </h1>

    <p class="mt-3 text-sm font-medium leading-7 text-yachay-muted">
      Ingresa tu correo institucional. Si está registrado, recibirás un enlace
      para crear una nueva contraseña.
    </p>

    @if (successMessage()) {
      <div
        class="mt-5 rounded-lg border border-yachay-success bg-yachay-success/10 px-4 py-3 text-sm font-bold text-yachay-success"
        role="status"
        aria-live="polite"
      >
        {{ successMessage() }}
      </div>
    }

    @if (errorMessage()) {
      <div
        class="mt-5 rounded-lg border border-yachay-danger bg-yachay-danger/10 px-4 py-3 text-sm font-bold text-yachay-danger"
        role="alert"
      >
        {{ errorMessage() }}
      </div>
    }

    <form [formGroup]="form" (ngSubmit)="sendLink()" class="mt-8 grid gap-5">
      <div>
        <label class="label" for="recovery-email">Correo institucional</label>
        <input
          id="recovery-email"
          type="email"
          formControlName="email"
          autocomplete="username"
          class="input"
          placeholder="estudiante@colegio.edu.pe"
          [class.input-invalid]="campoInvalido()"
          [attr.aria-invalid]="campoInvalido()"
          [attr.aria-describedby]="campoInvalido() ? 'recovery-email-error' : null"
        />
        @if (campoInvalido()) {
          <p id="recovery-email-error" class="field-error">
            Ingresa un correo válido.
          </p>
        }
      </div>

      <button
        type="submit"
        [disabled]="loading()"
        class="btn-primary"
      >
        @if (loading()) {
          Enviando...
        } @else {
          Enviar enlace
        }
      </button>
    </form>
  </section>
</main>
