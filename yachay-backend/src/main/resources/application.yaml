spring:
  application:
    name: backend
  datasource:
    url: jdbc:postgresql://localhost:5432/yachay
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
    open-in-view: false

server:
  port: 8080
  servlet:
    context-path: /api/v1