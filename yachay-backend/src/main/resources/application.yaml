spring:
  application:
    name: backend
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: false
    open-in-view: false
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
server:
  port: 8080
  servlet:
    context-path: /api

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}

mail:
  from: ${MAIL_FROM}
  from-name: ${MAIL_FROM_NAME:Yachay}

ilovepdf:
  public-key: ${ILOVEPDF_PUBLIC_KEY:project_public_7d736b1c3e606c0f25fc5c98bfd74952_V4y930ff1a912a7d136e380e341d39d0d51f9}
  secret-key: ${ILOVEPDF_SECRET_KEY:secret_key_c3ced951d131abea89826cc289e46fa2_TxDbm4068dc59014994a2de434f4d0563a74b}

whatsapp:
  enabled: ${WHATSAPP_ENABLED:false}
  token: ${WHATSAPP_TOKEN:}
  phone-number-id: ${WHATSAPP_PHONE_NUMBER_ID:}

app:
  frontend-url: ${APP_FRONTEND_URL:http://localhost:4200}
  seed:
    enabled: false
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}
